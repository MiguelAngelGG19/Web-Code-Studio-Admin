<nav class="navbar">
  <div class="navbar-container">
    <!-- Logo y nombre de la aplicación -->
    <div class="navbar-brand" [routerLink]="'/home'">
      <div class="brand-logo">A</div>
      <span class="brand-name">{{ applicationName }}</span>
    </div>

    <!-- Links administrativos (cuando está logueado) -->
    <div class="navbar-links" [class.active]="isMenuOpen" *ngIf="isLoggedIn">
      <a routerLink="/home" (click)="closeMenu()" routerLinkActive="active" class="nav-link">Inicio</a>
      <a routerLink="/gestion" (click)="closeMenu()" routerLinkActive="active" class="nav-link">Gestion</a>
      <a routerLink="/suscripciones" (click)="closeMenu()" routerLinkActive="active" class="nav-link">Suscripciones</a>
      <a routerLink="/ejercicios" (click)="closeMenu()" routerLinkActive="active" class="nav-link">Ejercicios</a>
    </div>

    <!-- Acciones administrativas (cuando está logueado) -->
    <div class="navbar-actions" *ngIf="isLoggedIn">
      <div class="admin-menu">
        <div class="user-menu" (click)="goToPerfil()">
          <div class="user-avatar">👤</div>
          <span class="user-name">Admin</span>
        </div>
        
        <button (click)="logout()" class="btn-logout">Salir</button>
      </div>
    </div>

    <!-- Hamburger menu para móvil -->
    <button class="hamburger" [class.active]="isMenuOpen" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>
