<div class="login-wrapper">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">A</div>
        <h1>Bienvenido</h1>
        <p>Panel de Administración</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input
            type="email"
            id="email"
            class="form-control"
            formControlName="email"
            placeholder="tu@email.com"
            [class.is-invalid]="submitted && email?.invalid"
          />
          <div class="error-message" *ngIf="submitted && email?.invalid">
            <span *ngIf="email?.errors?.['required']">El correo es requerido</span>
            <span *ngIf="email?.errors?.['email']">Ingrese un correo válido</span>
          </div>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="password">Contraseña</label>
            <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
          </div>
          <div class="password-input-group">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              class="form-control"
              formControlName="password"
              placeholder="Tu contraseña segura"
              [class.is-invalid]="submitted && password?.invalid"
            />
            <button
              type="button"
              class="toggle-password"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              <span *ngIf="!showPassword">👁️</span>
              <span *ngIf="showPassword">🔒</span>
            </button>
          </div>
          <div class="error-message" *ngIf="submitted && password?.invalid">
            <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
            <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres</span>
          </div>
        </div>

        <div class="form-group checkbox">
          <input
            type="checkbox"
            id="rememberMe"
            formControlName="rememberMe"
          />
          <label for="rememberMe">Recuérdame</label>
        </div>

        <button
          type="submit"
          class="btn-submit"
          [disabled]="loading"
        >
          <span *ngIf="!loading">Iniciar Sesión</span>
          <span *ngIf="loading">Procesando...</span>
        </button>
      </form>

    </div>
  </div>
</div>
